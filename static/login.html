<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gauntlet — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --orange: #FF6B35;
            --dark-bg: #1a2332;
            --darker-bg: #0f1419;
            --light-text: #ffffff;
            --gray-text: #a0aec0;
            --error: #ff4444;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            color: var(--light-text);
            background: var(--darker-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--dark-bg);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 107, 53, 0.2);
        }
        .login-box h1 {
            text-align: center;
            color: var(--orange);
            font-size: 2rem;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
        }
        .login-box .subtitle {
            text-align: center;
            color: var(--gray-text);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            color: var(--gray-text);
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--darker-bg);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 8px;
            color: var(--light-text);
            font-size: 1rem;
            font-family: -apple-system, sans-serif;
        }
        .form-group input:focus { outline: none; border-color: var(--orange); }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
        .btn-login:hover { box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            color: var(--error);
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.4em;
        }
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray-text);
            font-size: 0.9rem;
        }
        .signup-link a { color: var(--orange); text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>THE GAUNTLET</h1>
        <p class="subtitle">Voice-Driven AI RPG</p>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login" id="btn-login">Enter</button>
            <div class="error-msg" id="error-msg"></div>
        </form>
        <div class="signup-link">
            No account? <a href="#" onclick="handleSignup(event)">Create one</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script src="/api/config.js"></script>
    <script>
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // If already logged in, redirect
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/';
        });

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errEl = document.getElementById('error-msg');
            btn.disabled = true;
            errEl.textContent = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                errEl.textContent = error.message;
                btn.disabled = false;
            } else {
                window.location.href = '/';
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('error-msg');

            if (!email || !password) {
                errEl.textContent = 'Enter email and password first';
                return;
            }
            if (password.length < 6) {
                errEl.textContent = 'Password must be at least 6 characters';
                return;
            }

            const { error } = await sb.auth.signUp({ email, password });
            if (error) {
                errEl.textContent = error.message;
            } else {
                errEl.style.color = '#22c55e';
                errEl.textContent = 'Check your email to confirm, then log in.';
            }
        }
    </script>
</body>
</html>
